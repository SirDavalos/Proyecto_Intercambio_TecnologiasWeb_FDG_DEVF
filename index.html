<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Modo Claro/Oscuro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-cyan shadow">
        <div class="container">
            
            <a class="navbar-brand fw-bold" href="#">TechNova</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item me-3">
                        <a class="nav-link text-white" href="#">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <button id="toggleModo" class="btn btn-light rounded-pill px-3">
                            🌙
                        </button>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO DE EJEMPLO -->
    <div class="container py-5 text-center">
        <h1>Contenido de prueba</h1>
        <p>El modo seleccionado se guarda automáticamente.</p>
        
    </div>

    <div class="container py-5">
        <div class="card" style="width: 25rem;">
            <div class="card-body">
                <fieldset>
                    <label for="textBoxOrganizador">Nombre del Organizador</label>
                    <input type="text" name="textBoxOrganizador" id="textBoxOrganizador" placeholder="Introduzca su nombre">
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="CheckOrganizador" name="CheckOrganizador">
                        <label class="form-check-label" for="CheckOrganizador">Incluye al organizador en el intercambio</label>
                    </div>
                    <a href="#" id="ContinuarButton" class="btn btn-primary">Continuar</a>
                </fieldset>
            </div>
        </div>
    </div>

    <div class="container py-5">
        <div class="card" id="Card_Organizador" style="width: 25rem;">
            <div class="card-body">
                <fieldset>
                    <label for="textBoxOrganizador">Integrantes</label>
                    <input type="text" name="textBoxOrganizador" id="textBoxOrganizador" placeholder="Introduzca su nombre">
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="CheckOrganizador" name="CheckOrganizador">
                        <label class="form-check-label" for="CheckOrganizador">Incluye al organizador en el intercambio</label>
                    </div>
                    <a href="#" id="ContinuarButton" class="btn btn-primary">Continuar</a>
                </fieldset>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
